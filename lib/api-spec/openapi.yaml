openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CV Generator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resumes
    description: Resume operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /resumes:
    get:
      operationId: listResumes
      tags: [resumes]
      summary: List all resumes
      responses:
        "200":
          description: List of resumes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeSummary"
    post:
      operationId: createResume
      tags: [resumes]
      summary: Create a new resume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeInput"
      responses:
        "201":
          description: Created resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"

  /resumes/{id}:
    get:
      operationId: getResume
      tags: [resumes]
      summary: Get a resume by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateResume
      tags: [resumes]
      summary: Update a resume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeUpdate"
      responses:
        "200":
          description: Updated resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteResume
      tags: [resumes]
      summary: Delete a resume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    PersonalInfo:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        jobTitle:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        postalCode:
          type: string
        locality:
          type: string
        birthDate:
          type: string
        nationality:
          type: string
        maritalStatus:
          type: string
        idNumber:
          type: string
        linkedin:
          type: string
        website:
          type: string
        summary:
          type: string
        photoUrl:
          type: ["string", "null"]

    WorkExperience:
      type: object
      properties:
        id:
          type: string
        jobTitle:
          type: string
        employer:
          type: string
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        current:
          type: boolean
        city:
          type: string
        description:
          type: string
      required:
        - id
        - jobTitle
        - employer
        - startDate
        - current

    Education:
      type: object
      properties:
        id:
          type: string
        school:
          type: string
        degree:
          type: string
        fieldOfStudy:
          type: string
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        current:
          type: boolean
        city:
          type: string
        description:
          type: string
      required:
        - id
        - school
        - degree
        - startDate
        - current

    Skill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        level:
          type: integer
      required:
        - id
        - name
        - level

    Language:
      type: object
      properties:
        id:
          type: string
        language:
          type: string
        proficiency:
          type: string
      required:
        - id
        - language
        - proficiency

    ResumeData:
      type: object
      properties:
        personalInfo:
          $ref: "#/components/schemas/PersonalInfo"
        workExperience:
          type: array
          items:
            $ref: "#/components/schemas/WorkExperience"
        education:
          type: array
          items:
            $ref: "#/components/schemas/Education"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        languages:
          type: array
          items:
            $ref: "#/components/schemas/Language"

    Resume:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        template:
          type: string
        accentColor:
          type: string
        data:
          $ref: "#/components/schemas/ResumeData"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - template
        - accentColor
        - data
        - createdAt
        - updatedAt

    ResumeSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        template:
          type: string
        accentColor:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        jobTitle:
          type: ["string", "null"]
        updatedAt:
          type: string
      required:
        - id
        - title
        - template
        - accentColor
        - updatedAt

    ResumeInput:
      type: object
      properties:
        title:
          type: string
        template:
          type: string
        accentColor:
          type: string
        data:
          $ref: "#/components/schemas/ResumeData"
      required:
        - title
        - template
        - accentColor
        - data

    ResumeUpdate:
      type: object
      properties:
        title:
          type: string
        template:
          type: string
        accentColor:
          type: string
        data:
          $ref: "#/components/schemas/ResumeData"
